<style>
    div {

        width: 200px;
        height: 200px;
        background-color: red;
        animation-name: myAnimation;
        animation-duration: 4s;
    }

    @keyframes myAnimation {
        0%   {background-color: red;}
        25%  {background-color: yellow;}
        50%  {background-color: blue;}
        100% {background-color: green;}
    }

    .photo-gallery {
        display:none;
        margin-top: 10px;
    }
    .photo{
        color: white;
        cursor: pointer;
        font-weight: bold;
        position: relative;
        display: inline;
    }

    .photo:hover + .photo-gallery{
        position:relative;
        display: block;
        width: 100%;
        height: 100%;
        padding: 0.5rem 1rem;
        transition: opacity 2s ease;
    }

    .animationTitle {
        text-align: center;
        animation: colorAnimation 10s infinite;
    }

    @keyframes colorAnimation {
        0%   { color: darkred; }
        25%  { color: orange; }
        50%  { color: blue; }
        75%  { color: purple; }
        100% { color: green; }
    }
    .biggerAnimation{
        color:#b477ed;
        font-family: 'Comic Sans MS';
        animation: growsize 3s infinite alternate;
    }

    @keyframes growsize {
        from {
            font-size: 16px;
        }
        to {
            font-size: 25px;
        }
    }

</style>
