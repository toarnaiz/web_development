<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NBA Teams</title>
</head>
<body>

<h1>NBA Team Stats</h1>

<input type="text" id="Nameinput">

<button onclick="getStats()">Get Stats</button>

<p>Position: <span id="Position"></span></p>
<p>Height: <span id="Height"></span></p>
<p>Weight: <span id="Weight"></span></p>
<p>Jersey Number: <span id="Jersey Number"></span></p>

<script>

    function getStats() {

        let playername = document.getElementById("Nameinput").value
        console.log(playername)
        let url =  "https://api.balldontlie.io/v1/players?search=" + playername;
        fetch(url, {
            headers: {
                "Authorization": "5f6bee08-41ba-4d55-9cbb-dd1cc13c2191",
            }
        })

            .then(function(response) {
                console.log(response);
                if (!response.ok) throw new Error("Network response was not ok");

                return response.json();

            })

            .then(function(data) {

                console.log(data);

                document.getElementById("Position").innerText = data.position;

                document.getElementById("Height").innerText = data.height;
                document.getElementById("Weight").innerText = data.weight;



            })

            .catch(function(error) {

                console.error("Fetch error:", error);

            });

    }

</script>

</body>
</html>
