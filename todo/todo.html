<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do</title>
</head>

<body>
<h1>Tomas To-Do List</h1>

<h2>Add a Category</h2>
<input id="category" type="text" placeholder="category name...">
<button onclick="add_category()">Add Category</button>

<h2>Add a task</h2>
<input id="task" type="text" placeholder="task name...">
<button onclick="new_task()">Add task</button>

<h2>Tasks</h2>
<div id="task_list"></div>

</body>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #7dbcd3;
    margin: 25px;
  }

  .category {
    margin-bottom: 20px;
  }

  .category h3 {
    margin-left: 10px;
    cursor: pointer;
  }

  div.task > input {
    margin-right: 15px;
  }

  #task_list {
    margin-left: 25px;
  }

  div.task {
    background-color: white;
    width: 80%;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 10px;
  }

  input[type='checkbox']:checked + span {
    color: #700000;
    text-decoration: line-through;
  }

  div.task:has(input[type='checkbox']:checked) {
    background-color: #4f7144;
  }

  div.task:hover {
    background-color: #f1f1f1;
  }
</style>

<script>
  let selected_category = null;

  function setCookie(cname, cvalue, exdays) {
    const d = new Date();
    d.setTime(d.getTime() + (exdays*24*60*60*1000));
    let expires = "expires="+ d.toUTCString();
    document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
  }

  function getCookie(cname) {
    let name = cname + "=";
    let decodedCookie = decodeURIComponent(document.cookie);
    let ca = decodedCookie.split(';');
    for(let i = 0; i <ca.length; i++) {
      let c = ca[i];
      while (c.charAt(0) == ' ') {
        c = c.substring(1);
      }
      if (c.indexOf(name) == 0) {
        return c.substring(name.length, c.length);
      }
    }
    return "";
  }

  function add_category() {
    let input = document.getElementById("category");
    let name = input.value;

    if (name == "") return;

    let category_div = document.createElement("div");
    category_div.className = "category";

    let title = document.createElement("h3");
    title.innerText = name;

    // click to select category
    title.onclick = function() {
      selected_category = category_div;
    };

    category_div.appendChild(title);

    let task_container = document.createElement("div");
    category_div.appendChild(task_container);

    document.getElementById("task_list").appendChild(category_div);

    input.value = "";
  }

  function new_task() {
    let task_input = document.getElementById('task');
    let task_name = task_input.value;

    if (task_name == "") return;

    if (selected_category == null) {
      alert("click a category first");
      return;
    }

    let task_container = selected_category.children[1];

    add_task(task_name, task_container);

    task_input.value = "";
    task_input.focus();
  }

  function add_task(task_name, container) {
    let new_div = document.createElement("div");
    new_div.className = "task";
    container.appendChild(new_div);

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    new_div.appendChild(checkbox);

    let new_span = document.createElement("span");
    new_span.className = "task_name";
    new_span.innerText = task_name;
    new_div.appendChild(new_span);

    let trash = document.createElement("span");
    trash.className = "trash";
    trash.innerText = "X";
    trash.style.float = "right";
    trash.addEventListener("click", delete_task);
    new_div.appendChild(trash);
  }

  function delete_task(e){
    e.target.parentElement.remove()
  }
</script>

</html>
