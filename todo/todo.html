<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do</title>
</head>
<body>
<h1>Tomas' To-Do List</h1>
<h2>Add a task</h2>
<label for="task">Task Name: </label><input id="task" type="text" placeholder="task name...">
<button id="add" onclick="new_task()">Add</button>

<h2>Tasks</h2>
<div id="task_list">
  <!--    </span><div class="task"><input type="checkbox"><span class="task_name">Task 1</span></div>-->
  <!--    </span><div class="task"><input type="checkbox"><span class="task_name">Task 2</span></div>-->
  <!--    </span><div class="task"><input type="checkbox"><span class="task_name">Task 3</span></div>-->
</div>
</body>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #6a915d;
    margin: 25px;
  }

  div.task > input {
    margin-right: 15px;
  }

  #task_list {
    margin-left: 25px;
  }

  div.task {
    background-color: white;
    width: 80%;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 10px;
  }

  input[type='checkbox']:checked + span {
    color: #700000;
    text-decoration: line-through;
  }

  div.task:has(input[type='checkbox']:checked) {
    background-color: #4f7144;
  }

  div.task:hover {
    background-color: #f1f1f1;
  }
</style>

<script>
  function new_task(){
    let task_input = document.getElementById('task');

    let task_name = task_input.value;
    if(task_name == ""){
      return false;
    }

    console.log(task_name);

    let new_div = document.createElement("div");
    new_div.className = "task";
    document.getElementById("task_list").appendChild(new_div);

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    new_div.appendChild(checkbox);

    let new_span = document.createElement("span");
    new_span.setAttribute("class", "task_name");
    new_span.innerText = task_name;
    new_div.appendChild(new_span);

    let trash = document.createElement("span");
    trash.className = "trash";
    trash.innerText = "🗑️";
    trash.style.float = "right";
    trash.addEventListener("click", delete_task)
    new_div.appendChild(trash);

    task_input.value = "";
    task_input.focus();
  }

  function delete_task(e){
    e.target.parentElement.remove();
  }
</script>
</html>
