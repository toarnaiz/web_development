<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do</title>
</head>
<body>
<h1>Tomas' To-Do List</h1>
<h2>Add a task</h2>
<label for="task">Task Name: </label><input id="task" type="text" placeholder="task name...">
<button id="add" onclick="new_task()">Add</button>

<h2>Tasks</h2>
<div id="task_list">
  <!--    </span><div class="task"><input type="checkbox"><span class="task_name">Task 1</span></div>-->
  <!--    </span><div class="task"><input type="checkbox"><span class="task_name">Task 2</span></div>-->
  <!--    </span><div class="task"><input type="checkbox"><span class="task_name">Task 3</span></div>-->
</div>
</body>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #6a915d;
    margin: 25px;
  }

  div.task > input {
    margin-right: 15px;
  }

  #task_list {
    margin-left: 25px;
  }

  div.task {
    background-color: white;
    width: 80%;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 10px;
  }

  input[type='checkbox']:checked + span {
    color: #700000;
    text-decoration: line-through;
  }

  div.task:has(input[type='checkbox']:checked) {
    background-color: #4f7144;
  }

  div.task:hover {
    background-color: #f1f1f1;
  }
</style>

<script>
  function setCookie(cname, cvalue, exdays) {
    const d = new Date();
    d.setTime(d.getTime() + (exdays*24*60*60*1000));
    let expires = "expires="+ d.toUTCString();
    document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
  }
  function getCookie(cname) {
    let name = cname + "=";
    let decodedCookie = decodeURIComponent(document.cookie);
    let ca = decodedCookie.split(';');
    for(let i = 0; i <ca.length; i++) {
      let c = ca[i];
      while (c.charAt(0) == ' ') {
        c = c.substring(1);
      }
      if (c.indexOf(name) == 0) {
        return c.substring(name.length, c.length);
      }
    }
    return "";
  }

  function new_task(){
    let task_input = document.getElementById('task');

    let task_name = task_input.value;
    if(task_name == ""){
      return false;
    }


    console.log(task_name);
    let currant_cookie = getCookie("task");
    setCookie("task", getCookie("task")  + "|" + task_name,15);


    let new_div = document.createElement("div");
    new_div.className = "task";
    document.getElementById("task_list").appendChild(new_div);

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    new_div.appendChild(checkbox);

    let new_span = document.createElement("span");
    new_span.setAttribute("class", "task_name");
    new_span.innerText = task_name;
    new_div.appendChild(new_span);

    let trash = document.createElement("span");
    trash.className = "trash";
    trash.innerText = "🗑️";
    trash.style.float = "right";
    trash.addEventListener("click", delete_task)
    new_div.appendChild(trash);

    task_input.value = "";
    task_input.focus();
  }

  function delete_task(e){
    e.target.parentElement.remove();
  }

  let current_cookie = getCookie("task");
  current_cookie = current_cookie.split('|');
  console.log(current_cookie);
  // console.log(current_cookie.length);
  // console.log(current_cookie[9])
  // current_cookie[9] = current_cookie[9].toUpperCase();
  for(let i = 0; i <  current_cookie.length; i = i +1) {
    new_task(current_cookie[i]);
  }
</script>
</html>
