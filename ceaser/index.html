<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ceaser Cipher</title>
</head>
<body>
<p>Ceaser Cipher</p>
<p>
<label for="key">Enter a key</label>
<input type="number" id="key" >
</p>
<p>
    <label for = "plaintext"> Enter your message: </label> <input type="text" id="plaintext" >
</p>
<p> <button id="encode" onclick="encode()">Encode</button> </p>
<p id="ciphertext" ></p>




</body>

<script>
    function encode() {
        let key = document.getElementById("key").value;
        key = parseInt(key);
        let plaintext = document.getElementById("plaintext").value;
        plaintext = plaintext.toUpperCase();

        let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let ciphertext = "";

        for(let i=0; i<plaintext.length;i++){
            let charLocation = chars.indexOf(plaintext[i]);
            let newCharLocation = charLocation * key;
            let newChar = chars[newCharLocation];
            console.log(plaintext[i],charLocation,newCharLocation,  );
            ciphertext = ciphertext + newCharLocation + " ";



        }
        document.getElementById("ciphertext").innerText = ciphertext;
    }

</script>
